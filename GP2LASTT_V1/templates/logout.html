<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Log Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      color: white;
    }

    /* Layout */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      background: #1a0540;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 50px;
    }

    .sidebar a {
      color: #c5b8e8;
      text-decoration: none;
      margin: 15px 0;
    }

    .sidebar a:hover {
      color: white;
    }

    .sidebar a.active {
      color: white;
      font-weight: 600;
    }

    .logout {
      margin-top: auto;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 40px;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 20px;
    }

    .user-img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      transition: 0.3s;
    }

    .user-img:hover {
      transform: scale(1.1);
      opacity: 0.9;
    }

    /* Logout box */
    .logout-box {
      background: white;
      color: #1a0540;
      padding: 40px;
      border-radius: 18px;
      max-width: 400px;
      margin: 60px auto;
      text-align: center;
    }

    .logout-box h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 15px;
    }

    .logout-box p {
      color: #666;
      margin-bottom: 30px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      transition: 0.2s;
    }

    .confirm {
      background: #1a0540;
      color: white;
    }

    .confirm:hover {
      opacity: 0.9;
    }

    .cancel {
      background: #f0edfb;
      color: #1a0540;
    }

    .cancel:hover {
      background: #e0d9f5;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>AppInsight</h2>
      <a href="/dashboard">Sentiment</a>
<a href="/compare">Compare App</a>
<a href="/upload">Upload</a>
<a href="/files">Uploaded Files</a>

      <div class="logout">
        <a href="logout.html" class="active">Log Out</a>
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <div class="topbar">
        <a href="profile.html">
          <img src="/static/Image - Copy/user.png" alt="User" class="user-img"/>
        </a>
      </div>

      <h1 style="font-family: 'Syne', sans-serif;">Log Out</h1>

      <div class="logout-box">
        <h2>Log out</h2>
        <p>Are you sure you want to log out?</p>
        <div class="buttons">
          <button class="btn confirm" onclick="confirmLogout()">Log out</button>
          <button class="btn cancel" onclick="window.location.href='/dashboard'">Cancel</button>

        </div>
      </div>

    </div>

  </div>
  <script>
    function confirmLogout() {
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
