<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppInsight – Reset Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }


    .subtitle {
      color: #d1d1d1;
      margin-bottom: 25px;
      font-size: 0.9rem;
      text-align: center;
    }

    .card {
      display: none;
      background: white;
      padding: 40px 30px;
      border-radius: 25px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .card.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #333;
    }

    h2 {
      color: #000;
      margin-bottom: 20px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 8px;
      margin-left: 5px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #f0f0f0;
      background-color: #f9f9f9;
      outline: none;
      font-size: 0.9rem;
    }

    .main-btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border-radius: 12px;
      border: none;
      background: #3a12a0;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .main-btn:hover {
      background: #5b21b6;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(75, 31, 168, 0.4);
    }

    .main-btn:active {
      transform: translateY(0);
    }

    .otp-inputs {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 25px 0;
    }

    .otp-inputs input {
      width: 65px;
      height: 65px;
      text-align: center;
      font-size: 1.6rem;
      font-weight: bold;
      background: #f0f0f0;
    }

    .success-icon {
      width: 110px;
      height: 110px;
      background: #3a12a0;
      color: white;
      font-size: 3.5rem;
      line-height: 110px;
      border-radius: 50%;
      margin: 0 auto 25px;
    }

    .info-text {
      color: #777;
      font-size: 0.85rem;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    .resend-text {
      font-size: 0.8rem;
      color: #999;
      margin-top: 15px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: #7c3aed;
      top: -150px;
      right: -100px;
    }

    .blob-2 {
      width: 350px;
      height: 350px;
      background: #a78bfa;
      bottom: -100px;
      left: -80px;
    }

    .page-footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 10px;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.35);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">

    <!-- Step 1: Enter Email -->
    <div class="card active" id="step1">
      <p class="subtitle" style="position: absolute; top: -40px; width: 100%; left: 0;">It's ok, it happens to the best
        of us.</p>
      <button class="back-btn" onclick="window.location.href='login.html'">‹</button>
      <div class="input-group" style="margin-top: 20px;">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email address" id="emailInput" />
      </div>
      <button class="main-btn" onclick="sendCode()">Send Code</button>
      <p class="error-msg" id="step1Error"></p>
    </div>
    

    <!-- Step 2: OTP Verification -->
    <div class="card" id="step2">
      <button class="back-btn" onclick="goToStep(1)">‹</button>
      <h2>Please check your email</h2>
      <p class="info-text">We've sent a code to <br /><b id="userMail">user@example.com</b></p>
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-box" placeholder="" />
        <input type="text" maxlength="1" class="otp-box" placeholder="" />
        <input type="text" maxlength="1" class="otp-box" placeholder="" />
        <input type="text" maxlength="1" class="otp-box" placeholder="" />
      </div>
      <p class="error-msg" id="step2Error"></p>
      <button class="main-btn" onclick="verifyCode()">Verify</button>
      <p class="resend-text">Resend code in <span id="countdown">00:20</span></p>
      <p class="resend-text" id="resendBtn" style="display: none; color:#3a12a0; cursor:pinter;" onclick="resendCode()">Resend Code</p>
    </div>

    <!-- Step 3: New Password -->
    <div class="card" id="step3">
      <button class="back-btn" onclick="goToStep(2)">‹</button>
      <h2>New Password</h2>
      <div class="input-group">
        <label>Enter New Password</label>
        <input type="password" id="newPassword" placeholder="••••••••••••" />
      </div>
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••••••" />
      </div>
      <button type="button" class="main-btn" onclick="resetPassword()">Reset Password</button>
      <p class="error-msg" id="step3Error"></p>
    </div>
    

    <!-- Step 4: Success -->
    <div class="card" id="step4">
      <h2>Password Updated</h2>
      <div class="success-icon">✓</div>
      <p class="info-text">Your password was successfully updated</p>
      <button class="main-btn" onclick="window.location.href='login.html'" style="background: #1a0540;">Back to Log
        in</button>
    </div>

  </div>

  <div class="page-footer-bar">© 2026 AppInsight. All rights reserved.</div>

  <script>



    function goToStep(n) {

      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');

      if (n === 2){
        startCountdown();
      }

    }



    async function sendCode() {

      const email = document.getElementById('emailInput').value.trim();
      const errEL = document.getElementById('step1Error');



      if (!email) {
        errEL.textContent = 'Please enter your email.';
        return;


      }

      errEL.textContent = '';
      const res = await fetch('/api/send-reset-code', {

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })



      });



      const data = await res.json();

      if (data.success) {
        document.getElementById('userMail').innerText = email;
        goToStep(2);



      } else {



        errEL.textContent = data.error || 'Failed to send code.';

      }

    }

    async function verifyCode() {
      const email = document.getElementById('emailInput').value.trim();
      const boxes = document.querySelectorAll('.otp-box');
      const code = Array.from(boxes).map(b => b.value).join('');
      const errEL = document.getElementById('step2Error');



      if (code.length < 4) {
        errEL.textContent = 'Please enter the full 4-digit code.';


        return;

      }

      errEL.textContent = '';

      const res = await fetch('/api/verify-reset-code', {



        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })



      });



      const data = await res.json();

      if (data.success) {

        goToStep(3);



      } else {



        errEL.textContent = 'Invalid code. Please try again.';

      }

    }

    async function resetPassword() {



  const email = document.getElementById('userMail').textContent;
  const newPass = document.getElementById('newPassword').value;
  const confirmPass = document.getElementById('confirmPassword').value;
  const errEL = document.getElementById('step3Error');



  if (!newPass || !confirmPass) {
    errEL.textContent = 'Please fill all fields.';

    return;

  }

  if (newPass !== confirmPass) {

    errEL.textContent = 'Passwords do not match.';

    return;



  }

  errEL.textContent = '';




  const res = await fetch('/api/reset-password', {

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: newPass })

  });



  const data = await res.json();

  if (data.success) {

    goToStep(4);

  } else {



    errEL.textContent = data.error || 'Failed to reset password.';

  }

}

    document.addEventListener('DOMContentLoaded', () => {
      const boxes = document.querySelectorAll('.otp-box');



      boxes.forEach((box, i) => {

        box.addEventListener('input', () => {

          if (box.value && i < boxes.length - 1) {



            boxes[i + 1].focus();

          }

        });

        box.addEventListener('keydown', e => {

          if (e.key === 'Backspace' && !box.value && i > 0) {

            boxes[i - 1].focus();

          }



        });



      });



    });

    function startCountdown(){
      let seconds = 20;
      document.getElementById('countdown').parentElement.style.display = 'block';
      document.getElementById('resendBtn').style.display = 'none';
      const timer = setInterval(() => {
        seconds--;
        const s = String(seconds).padStart(2, '0');
        document.getElementById('countdown').textContent = '00:' + s;
        if (seconds <= 0){
          clearInterval(timer);
          document.getElementById('countdown').parentElement.style.display= 'none';
          document.getElementById('resendBtn').style.display = 'block';
        }
      }, 1000);
    }

    async function resendCode(){
      const email = document.getElementById('emailInput').value.trim();
      await fetch('/api/send-reset-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({email})
      });
      startCountdown();
    }



  </script>

</body>

</html>
