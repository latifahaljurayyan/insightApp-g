<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Admin | Manage Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Override body for sidebar layout */
    body {
      margin: 0;
      display: block;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      min-height: 100vh;
      color: white;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 230px;
      background: #1a0540;
      padding: 30px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 50px;
    }

    .sidebar a {
      color: #c5b8e8;
      text-decoration: none;
      margin: 15px 0;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .sidebar a:hover {
      color: white;
    }

    .sidebar a.active {
      color: white;
      font-weight: 600;
    }

    .sidebar .nav-label {
      font-size: 0.65rem;
      color: rgba(197, 184, 232, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 24px 0 8px;
    }

    .logout {
      margin-top: auto;
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      padding: 40px;
      min-width: 0;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 30px;
    }

    .admin-badge {
      background: rgba(167, 139, 250, 0.18);
      border: 1px solid rgba(167, 139, 250, 0.35);
      color: #c4b5fd;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #c5b8e8;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-num {
      font-size: 2.5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: white;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      position: relative;
      min-width: 250px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 15px 10px 38px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .search-wrap input:focus {
      outline: none;
      border-color: rgba(196, 181, 253, 0.5);
      background: rgba(255, 255, 255, 0.15);
    }

    .search-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .filter-select {
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-select:focus {
      outline: none;
      border-color: rgba(196, 181, 253, 0.5);
    }

    /* ── Table Card ── */
    .table-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table thead {
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    table th {
      text-align: left;
      padding: 12px;
      color: #c4b5fd;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    table tbody tr:hover {
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #2d0e6e;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #c5b8e8;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: white;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: rgba(196, 181, 253, 0.5);
      background: rgba(255, 255, 255, 0.15);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel,
    .btn-save {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 11px;
      color: #c5b8e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: rgba(255, 255, 255, 0.12); }

    .btn-save {
      flex: 1;
      padding: 13px;
      background: #5b21b6;
      border: none;
      border-radius: 11px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #6d28d9; }

    .modal.delete-modal { text-align: center; }

    .delete-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(248, 113, 113, 0.15);
      border: 2px solid rgba(248, 113, 113, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 16px;
    }

    .modal.delete-modal h3 { margin-bottom: 8px; }

    .modal.delete-modal p {
      font-size: 0.88rem;
      color: #c5b8e8;
      margin-bottom: 0;
    }

    .btn-confirm-delete {
      flex: 1;
      padding: 13px;
      background: rgba(248, 113, 113, 0.2);
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 11px;
      color: #fca5a5;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-confirm-delete:hover { background: rgba(248, 113, 113, 0.35); }

    h1 {
      font-size: 2.2rem;
      font-family: 'Syne', sans-serif;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .pagination button {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pagination button:hover,
    .pagination button.active {
      background: #5b21b6;
      border-color: #5b21b6;
    }

    .action-btns {
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-edit {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid rgba(167, 139, 250, 0.3);
      background: rgba(167, 139, 250, 0.15);
      color: #c4b5fd;
      transition: background 0.2s;
    }

    .btn-edit:hover { background: rgba(167, 139, 250, 0.28); }

    .btn-delete {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid rgba(248, 113, 113, 0.25);
      background: rgba(248, 113, 113, 0.12);
      color: #fca5a5;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: rgba(248, 113, 113, 0.25); }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>AppInsight</h2>
      <span class="nav-label">Admin</span>
      <a href="/admin">Dashboard</a>
      <a href="/admin/users" class="active">Manage Users</a>
      <a href="/admin/model">Sentiment Model</a>
      <a href="/admin/faq">Manage FAQ</a>
      <div class="logout">
        <div class="logout">
  <a href="/admin-logout">Log Out</a>
</div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <div class="topbar">
        <span class="admin-badge">Admin Panel</span>
      </div>

      <h1 style="font-family: 'Syne', sans-serif; margin-bottom: 30px;">
        Manage <span style="color: #c4b5fd;">Users</span>
      </h1>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-num" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-num" id="activeUsers" style="color: #6ee7b7;">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Inactive</div>
          <div class="stat-num" id="inactiveUsers" style="color: #fca5a5;">0</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or email…"
            oninput="filterUsers()"
          />
        </div>
        <select class="filter-select" id="statusFilter" onchange="filterUsers()">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <!-- Table -->
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit User</h3>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="editName" placeholder="Full name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="editEmail" placeholder="Email address"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="editStatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal delete-modal">
      <div class="delete-icon">🗑️</div>
      <h3>Delete User?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">Yes, Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/static/js/admin-users.js"></script>
</body>
</html>
