<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Admin Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style-2.css"/>

  
  <!-- Error message styling - hidden by default -->
  <style>
    .error-msg {
      display: none;
      color: #e53e3e;
      font-size: 0.78rem;
      margin-top: 5px;
    }

    .input-error {
      border-color: #e53e3e !important;
      box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.13) !important;
    }
  </style>
</head>

<body class="form-page">
  <!-- Decorative blob background elements -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!--  login card container -->
  <div class="card admin-card">
    <div class="card-header">
      <h2>Admin Log In</h2>
      <span class="subtitle"><span class="dot"></span> Restricted Access</span>
    </div>


    <div class="form-group">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="Admin Email Address"/>
      <span class="error-msg" id="emailError">Please enter a valid email address.</span>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pass" placeholder="**********"/>
        <button class="eye-btn" onclick="toggle('pass', this)">👁️</button>
      </div>
      <span class="error-msg" id="passError">Password is required.</span>
    </div>

    <button class="btn-primary" onclick="adminLogin()">Log in</button>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>

  <div class="page-footer-bar">© 2026 AppInsight. All rights reserved.</div>

  <script>
    // Function to toggle password visibility
    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁️⃠';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }
  
    // Function to validate and submit login form
    function adminLogin() {
      var emailEl = document.getElementById('adminEmail');
      var passEl  = document.getElementById('pass');
      var emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      var valid   = true;

      // Validate email format 
      if (!emailRx.test(emailEl.value.trim())) {
        emailEl.classList.add('input-error');
        document.getElementById('emailError').style.display = 'block';
        valid = false;
      } else {
        emailEl.classList.remove('input-error');
        document.getElementById('emailError').style.display = 'none';
      }
      // Validate password is not empty
      if (!passEl.value.trim()) {
        passEl.classList.add('input-error');
        document.getElementById('passError').style.display = 'block';
        valid = false;
      } else {
        passEl.classList.remove('input-error');
        document.getElementById('passError').style.display = 'none';
      }

       // If all validations pass, submit to server 
      if (valid) {
        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value.trim(), password: passEl.value })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.success) {
            window.location.href = '/admin-dashboard.html';
          } else {
            document.getElementById('passError').textContent = data.error || 'Invalid credentials.';
            document.getElementById('passError').style.display = 'block';
            passEl.classList.add('input-error');
          }
        })
        .catch(function() {
          alert('Server error. Please try again.');
        });
      }
    }
  </script>

</body>
</html>
