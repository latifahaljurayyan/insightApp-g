<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Log Out</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      color: white;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* 👑 Admin Sidebar */
    .sidebar {
      width: 230px;
      background: #1a0540;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 40px;
    }

    .nav-label {
      font-size: 0.7rem;
      color: #aaa;
      margin-bottom: 10px;
    }

    .sidebar a {
      color: #c5b8e8;
      text-decoration: none;
      margin: 12px 0;
    }

    .sidebar a:hover {
      color: white;
    }

    .sidebar a.active {
      color: white;
      font-weight: 600;
    }

    .logout {
      margin-top: auto;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 40px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .admin-badge {
      background: rgba(167, 139, 250, 0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
    }

    .logout-box {
      background: white;
      color: #1a0540;
      padding: 40px;
      border-radius: 18px;
      max-width: 400px;
      margin: 60px auto;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
    }

    .confirm {
      background: #1a0540;
      color: white;
    }

    .cancel {
      background: #eee;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 👑 Admin Sidebar -->
    <div class="sidebar">
      <h2>AppInsight</h2>
      <span class="nav-label">Admin</span>

      <a href="/admin">Dashboard</a>
      <a href="/admin/users">Manage Users</a>
      <a href="/admin/model">Sentiment Model</a>
      <a href="/admin/faq">Manage FAQ</a>

      <div class="logout">
        <a href="/admin-logout" class="active">Log Out</a>
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <div class="topbar">
        <span class="admin-badge">Admin Panel</span>
      </div>

      <h1>Admin Log Out</h1>

      <div class="logout-box">
        <h2>Log out</h2>
        <p>Are you sure you want to log out?</p>

        <div class="buttons">
          <button class="btn confirm" onclick="confirmLogout()">Log out</button>
          <button class="btn cancel" onclick="goBack()">Cancel</button>
        </div>
      </div>

    </div>

  </div>

  <script>
    function goBack() {
      window.location.href = '/admin';
    }

    function confirmLogout() {
      window.location.href = '/login';
    }
  </script>

</body>
</html>
