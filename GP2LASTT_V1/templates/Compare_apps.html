<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AppInsight – Compare Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
            --sidebar-color: #1a0540;
            --card-bg: rgba(255, 255, 255, 0.05);
            --stat-box-bg: rgba(0, 0, 0, 0.2);
            --border-color: rgba(255, 255, 255, 0.1);
            
            --pos-green: #3fb950;
            --neg-red: #f85149;
            --neu-yellow: #d29922;
            --accent-purple: #7c3aed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-gradient);
            color: white;
            min-height: 100vh;
            display: flex;
        }

        .app { display: flex; width: 100%; min-height: 100vh; }

       
    .sidebar { width: 220px; background: var(--sidebar-color); padding: 25px 15px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); flex-shrink: 0; }
    .sidebar h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; font-size: 20px; color: white; font-weight: 800; }
    
    .user-profile-section { display: flex; flex-direction: column; align-items: center; padding: 15px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
    .user-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-purple); padding: 2px; margin-bottom: 12px; object-fit: cover; box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2); transition: 0.3s; cursor: pointer; }
    .user-avatar:hover { transform: scale(1.05); border-color: #a78bfa; }
    .user-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: white; word-break: break-word; }
    .user-email { font-size: 11px; color: #a0a0b8; word-break: break-word; }

    .sidebar a { color: var(--text-muted); text-decoration: none; margin: 8px 0; font-size: 14px; padding: 12px 15px; border-radius: 12px; display: block; transition: 0.3s; }
    .sidebar a.active, .sidebar a:hover { color: white; background: rgba(124, 58, 237, 0.2); }


       
        .main { 
            flex: 1; 
            padding: 40px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        h1 { 
            font-family: 'Syne', sans-serif; 
            font-size: 32px; 
            margin-bottom: 40px; 
            width: 100%; 
            text-align: center;
        }


        /* Upload Container */
        .upload-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border: 2px dashed var(--border-color);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
            transition: 0.3s;
        }

        .upload-container:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .upload-grid label { 
            display: block; 
            font-size: 13px; 
            color: #c5b8e8; 
            margin-bottom: 8px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upload-grid input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .upload-grid input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.1);
        }

        .btn-compare {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 16px 60px;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-compare:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }

        .btn-compare:active {
            transform: translateY(-1px);
        }

        
        #resultsWrapper { 
            display: none;
            width: 100%;
            max-width: 1200px;
        }

        .comparison-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border: 1px solid #e5e5e5;
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            color: #1a0540;
        }

        .card:hover {
            background: white;
            border-color: #d0d0d0;
        }

        .card-header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .badge { 
            background: var(--accent-purple); 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-header h2 {
            font-size: 18px;
            font-family: 'Syne', sans-serif;
            margin: 0;
        }

        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            transition: 0.3s;
        }

        .stat-item:hover {
            background: #efefef;
            border-color: #d0d0d0;
        }

        .stat-item .val {
            display: block;
            font-size: 24px;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            margin-bottom: 4px;
        }

        .stat-item .lbl {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Progress Bars */
        .progress-box { margin-top: 20px; }

        .bar-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 15px; 
            font-size: 13px; 
        }

        .bar-label { 
            width: 70px; 
            color: #333;
            font-weight: 600;
        }

        .bar-trail { 
            flex: 1; 
            height: 8px; 
            background: #e0e0e0; 
            border-radius: 10px; 
            margin: 0 15px; 
            overflow: hidden; 
        }

        .bar-fill { 
            height: 100%; 
            border-radius: 10px; 
            width: 0%; 
            transition: width 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); 
        }
        
        .pct-text { 
            width: 45px; 
            text-align: right; 
            font-weight: 700;
        }

        /* Color Classes */
        .c-pos { color: var(--pos-green); }
        .c-neg { color: var(--neg-red); }
        .c-neu { color: var(--neu-yellow); }
        .bg-pos { background: var(--pos-green); }
        .bg-neg { background: var(--neg-red); }
        .bg-neu { background: var(--neu-yellow); }

        /* Chart Panel */
        .chart-panel {
            width: 100%;
            background: white;
            border: 1px solid #e5e5e5;
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
        }

        .chart-panel h3 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            margin-bottom: 20px;
            color: #1a0540;
        }

        /* Error Message */
        .file-error {
            display: none;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: #f85149;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .file-error.visible {
            display: block;
        }

       
        @media (max-width: 1024px) {
            .comparison-cards {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
                padding: 20px;
            }

            .main {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .upload-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 15px;
                flex-direction: row;
                overflow-x: auto;
                flex-wrap: wrap;
            }

            .main {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Sidebar -->
  <div class="sidebar">
      <h2>AppInsight</h2>
      <div class="user-profile-section">
        <a href="/profile.html"><img src="/static/Image - Copy/user.png" alt="Profile" class="user-avatar"></a>
        <span class="user-name" id="userName">User</span>
        <span class="user-email" id="userEmail">Email</span>
      </div>
      <nav>
        <a href="/dashboard">Sentiment Analysis</a>
        <a href="/compare" class="active">Compare Apps</a>
        <a href="/upload">Upload Center</a>
        <a href="/files">File Library</a>
      </nav>
      <div class="logout" style="margin-top:auto;"><a href="/logout" style="color:var(--text-muted); text-decoration:none;">Log Out</a></div>
    </div>

    <div class="main">
        

        <h1>Compare Apps</h1>

        <div class="upload-container">
            <div class="file-error" id="fileError"></div>
            <div class="upload-grid">
                <div>
                    <label>Select File 1 (CSV)</label>
                    <input type="file" id="file1" accept=".csv">
                </div>
                <div>
                    <label>Select File 2 (CSV)</label>
                    <input type="file" id="file2" accept=".csv">
                </div>
            </div>
            <button class="btn-compare" onclick="runCompare()">Compare</button>
        </div>

        <div id="resultsWrapper">
            <div class="comparison-cards">
                
                <div class="card">
                    <div class="card-header">
                        <span class="badge" id="badge1">App 1</span>
                        <h2 id="app1Name">App 1</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="val" id="a1Total">0</span>
                            <span class="lbl">Total Reviews</span>
                        </div>
                        <div class="stat-item">
                            <span class="val" id="a1Rate">—</span>
                            <span class="lbl">Avg Rating</span>
                        </div>
                    </div>
                    <div class="progress-box">
                        <div class="bar-row">
                            <span class="bar-label">Positive</span>
                            <div class="bar-trail"><div id="fillPos1" class="bar-fill bg-pos"></div></div>
                            <span class="pct-text c-pos" id="pctPos1">0%</span>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label">Negative</span>
                            <div class="bar-trail"><div id="fillNeg1" class="bar-fill bg-neg"></div></div>
                            <span class="pct-text c-neg" id="pctNeg1">0%</span>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label">Neutral</span>
                            <div class="bar-trail"><div id="fillNeu1" class="bar-fill bg-neu"></div></div>
                            <span class="pct-text c-neu" id="pctNeu1">0%</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="badge" id="badge2" style="background:#00d1b2;">App 2</span>
                        <h2 id="app2Name">App 2</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="val" id="a2Total">0</span>
                            <span class="lbl">Total Reviews</span>
                        </div>
                        <div class="stat-item">
                            <span class="val" id="a2Rate">—</span>
                            <span class="lbl">Avg Rating</span>
                        </div>
                    </div>
                    <div class="progress-box">
                        <div class="bar-row">
                            <span class="bar-label">Positive</span>
                            <div class="bar-trail"><div id="fillPos2" class="bar-fill bg-pos"></div></div>
                            <span class="pct-text c-pos" id="pctPos2">0%</span>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label">Negative</span>
                            <div class="bar-trail"><div id="fillNeg2" class="bar-fill bg-neg"></div></div>
                            <span class="pct-text c-neg" id="pctNeg2">0%</span>
                        </div>
                        <div class="bar-row">
                            <span class="bar-label">Neutral</span>
                            <div class="bar-trail"><div id="fillNeu2" class="bar-fill bg-neu"></div></div>
                            <span class="pct-text c-neu" id="pctNeu2">0%</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Bar Chart Panel -->
            <div class="chart-panel" style="margin-top: 0;">
                <h3>Sentiment Comparison</h3>
                <canvas id="compareChart" height="120"></canvas>
            </div>

        </div>
    </div>
</div>

<script>
    var compareChartInst = null;

    function getName(filename) {
        return filename.replace(/\.[^/.]+$/, '');
    }

   
    function loadUserData() {
      fetch('/api/profile')
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (!res.success) return;
          var u = res.user;
          document.getElementById('userName').textContent  = ((u.first_name || '') + ' ' + (u.last_name || '')).trim() || 'User';
          document.getElementById('userEmail').textContent = u.email || '';
        });
    }

    function pct(n, total) { return total ? Math.round(n / total * 100) : 0; }

    function fillData(cardId, result) {
        var pos = (result.summary.Positive || {}).count || 0;
        var neg = (result.summary.Negative || {}).count || 0;
        var neu = (result.summary.Neutral  || {}).count || 0;
        var total = result.total;

        var posP = pct(pos, total);
        var negP = pct(neg, total);
        var neuP = pct(neu, total);

        var ratedReviews = (result.results || []).filter(function(r) { return parseFloat(r.rating) > 0; });
        var avgRating = ratedReviews.length
            ? (ratedReviews.reduce(function(sum, r) { return sum + parseFloat(r.rating); }, 0) / ratedReviews.length).toFixed(1) + ' ★'
            : (result.avg_rating != null ? parseFloat(result.avg_rating).toFixed(1) + ' ★' : '—');

        document.getElementById('a' + cardId + 'Total').innerText = total.toLocaleString();
        document.getElementById('a' + cardId + 'Rate').innerText  = avgRating;

        setTimeout(function() {
            document.getElementById('fillPos' + cardId).style.width = posP + '%';
            document.getElementById('fillNeg' + cardId).style.width = negP + '%';
            document.getElementById('fillNeu' + cardId).style.width = neuP + '%';
            document.getElementById('pctPos'  + cardId).innerText   = posP + '%';
            document.getElementById('pctNeg'  + cardId).innerText   = negP + '%';
            document.getElementById('pctNeu'  + cardId).innerText   = neuP + '%';
        }, 100);

        return { pos: pos, neg: neg, neu: neu };
    }

    function renderResults(name1, r1, name2, r2) {
        document.getElementById('app1Name').textContent = name1;
        document.getElementById('app2Name').textContent = name2;
        document.getElementById('badge1').textContent   = name1.substring(0, 4).toUpperCase();
        document.getElementById('badge2').textContent   = name2.substring(0, 4).toUpperCase();
        document.getElementById('resultsWrapper').style.display = 'block';

        var d1 = fillData(1, r1);
        var d2 = fillData(2, r2);

        if (compareChartInst) compareChartInst.destroy();
        compareChartInst = new Chart(document.getElementById('compareChart'), {
            type: 'bar',
            data: {
                labels: ['Positive', 'Neutral', 'Negative'],
                datasets: [
                    { label: name1, data: [d1.pos, d1.neu, d1.neg],
                      backgroundColor: 'rgba(63, 185, 80, 0.85)', borderRadius: 8,
                      borderColor: 'rgba(63, 185, 80, 1)', borderWidth: 1 },
                    { label: name2, data: [d2.pos, d2.neu, d2.neg],
                      backgroundColor: 'rgba(210, 185, 34, 0.85)', borderRadius: 8,
                      borderColor: 'rgba(210, 185, 34, 1)', borderWidth: 1 }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { font: { family: 'DM Sans', size: 14 }, color: '#1a0540',
                                  usePointStyle: true, pointStyle: 'circle' }
                    }
                },
                scales: {
                    y: { beginAtZero: true,
                         grid: { color: 'rgba(0,0,0,0.07)' },
                         ticks: { color: '#444', font: { family: 'DM Sans' } } },
                    x: { grid: { display: false },
                         ticks: { color: '#444', font: { family: 'DM Sans', size: 13 } } }
                }
            }
        });
    }

    loadUserData();

    /* Restore last comparison from DB on page load */
    fetch('/api/compare/latest')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                renderResults(data.name1, data.app1, data.name2, data.app2);
            }
        })
        .catch(function() {});

    function runCompare() {
        var f1    = document.getElementById('file1').files[0];
        var f2    = document.getElementById('file2').files[0];
        var errEl = document.getElementById('fileError');

        if (!f1 && !f2) { errEl.innerText = 'Please select two CSV files to compare.'; errEl.classList.add('visible'); return; }
        if (!f1)        { errEl.innerText = 'Please select File 1.';                   errEl.classList.add('visible'); return; }
        if (!f2)        { errEl.innerText = 'Please select File 2.';                   errEl.classList.add('visible'); return; }
        errEl.classList.remove('visible');

        var name1    = getName(f1.name);
        var name2    = getName(f2.name);
        var formData = new FormData();
        formData.append('file1', f1);
        formData.append('file2', f2);

        fetch('/api/compare', { method: 'POST', body: formData })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) { errEl.innerText = data.error; errEl.classList.add('visible'); return; }
                renderResults(name1, data.app1, name2, data.app2);
            })
            .catch(function() {
                errEl.innerText = 'Server error. Please try again.';
                errEl.classList.add('visible');
            });
    }
</script>

</body>
</html>
