<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style-2.css"/>

  <!-- Error message styling - hidden by default -->
  <style>
    .error-msg {
      display: none;
      color: #e53e3e;
      font-size: 0.78rem;
      margin-top: 5px;
    }

    .input-error {
      border-color: #e53e3e !important;
      box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.13) !important;
    }
  </style>
</head>

<body class="form-page">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!--  login card container -->
  <div class="card">
    <a href="HomePage.html" class="back-arrow">&#8249;</a>
    <div class="card-header">
      <h2>Log In</h2>
      <p>Welcome back!</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Email Address"/>
      <span class="error-msg" id="emailError">Please enter a valid email address.</span>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pass" placeholder="**********"/>
        <button class="eye-btn" onclick="toggle('pass', this)">👁️</button>
      </div>
      <span class="error-msg" id="passError">Password is required.</span>
    </div>

    <!-- links to forgot password and admin login -->
    <div class="form-row">
      <a href="forget_password.html">Forget Password?</a>
      <a href="login-admin.html" class="admin-link">Log in as Admin →</a>
    </div>

    <button class="btn-primary" onclick="handleLogin()">Log in</button>

    <p class="footer-text">Don't have an account? <a href="signup.html">sign up</a></p>
  </div>

  <div class="page-footer-bar">© 2026 AppInsight. All rights reserved.</div>

  <script>
    function toggle(id, btn) {
      var input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '👁️⃠';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    function handleLogin() {
      var emailEl = document.getElementById('email');
      var passEl  = document.getElementById('pass');
      var emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      var valid   = true;

      if (!emailRx.test(emailEl.value.trim())) {
        emailEl.classList.add('input-error');
        document.getElementById('emailError').style.display = 'block';
        valid = false;
      } else {
        emailEl.classList.remove('input-error');
        document.getElementById('emailError').style.display = 'none';
      }

      if (!passEl.value.trim()) {
        passEl.classList.add('input-error');
        document.getElementById('passError').style.display = 'block';
        valid = false;
      } else {
        passEl.classList.remove('input-error');
        document.getElementById('passError').style.display = 'none';
      }

      if (valid) {
        fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value.trim(), password: passEl.value })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.success) {
            window.location.href = '/dashboard';
          } else {
            document.getElementById('passError').textContent = data.error || 'Login failed.';
            document.getElementById('passError').style.display = 'block';
            passEl.classList.add('input-error');
          }
        })
        .catch(function() {
          alert('Server error. Please try again.');
        });
      }
    }
  </script>

</body>
</html>
