<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-gradient: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      --sidebar-color: #1a0540;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --accent-purple: #7c3aed;
      --text-muted: #c5b8e8;
      --success-green: #3fb950;
      --error-red: #f85149;
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-gradient);
      color: white;
      min-height: 100vh;
      display: flex;
    }

    .app { 
      display: flex; 
      width: 100%; 
      min-height: 100vh;
    }

    
    .sidebar { width: 220px; background: var(--sidebar-color); padding: 25px 15px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); flex-shrink: 0; }
    .sidebar h2 { font-family: 'Syne', sans-serif; margin-bottom: 20px; font-size: 20px; color: white; font-weight: 800; }
    
    .user-profile-section { display: flex; flex-direction: column; align-items: center; padding: 15px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
    .user-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-purple); padding: 2px; margin-bottom: 12px; object-fit: cover; box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2); transition: 0.3s; cursor: pointer; }
    .user-avatar:hover { transform: scale(1.05); border-color: #a78bfa; }
    .user-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: white; word-break: break-word; }
    .user-email { font-size: 11px; color: #a0a0b8; word-break: break-word; }

    .sidebar a { color: var(--text-muted); text-decoration: none; margin: 8px 0; font-size: 14px; padding: 12px 15px; border-radius: 12px; display: block; transition: 0.3s; }
    .sidebar a.active, .sidebar a:hover { color: white; background: rgba(124, 58, 237, 0.2); }
    /* --- Main Content --- */
    .main { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      padding: 40px;
      overflow-y: auto;
    }

    h1 { 
      font-family: 'Syne', sans-serif; 
      margin-bottom: 40px; 
      font-size: 36px;
      font-weight: 800;
    }

    .upload-box {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      padding: 50px;
      width: 100%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.07);
    }

    .upload-box h2 { 
      font-family: 'Syne', sans-serif; 
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: 800;
    }

    .upload-box p { 
      color: var(--text-muted); 
      font-size: 14px; 
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* Drop Area */
    .drop-area {
      border: 2px dashed var(--border-color);
      padding: 50px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.2);
      transition: 0.3s;
      margin-bottom: 30px;
      cursor: pointer;
    }

    .drop-area:hover { 
      border-color: var(--accent-purple); 
      background: rgba(124, 58, 237, 0.05);
      color: white;
    }

    .drop-area.dragover {
      border-color: var(--accent-purple);
      background: rgba(124, 58, 237, 0.1);
      color: white;
    }

    .drop-area p {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      color: inherit;
    }

    /* Validation Panel */
    .validation-panel {
      display: none; 
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px; 
      padding: 20px; 
      margin-bottom: 25px; 
      text-align: left;
      border: 1px solid var(--border-color);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .validation-panel.show { 
      display: block; 
    }

    .col-row { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      margin-bottom: 10px; 
      font-size: 13px;
    }

    .col-row:last-child {
      margin-bottom: 0;
    }

    .col-icon {
      font-weight: 700;
      font-size: 14px;
      min-width: 16px;
    }

    .col-icon.ok { 
      color: var(--success-green);
    }

    .col-icon.err { 
      color: var(--error-red);
    }

    /* Upload Actions */
    .upload-actions { 
      display: flex; 
      gap: 15px;
    }

    .upload-actions button {
      flex: 1; 
      padding: 16px; 
      border: none; 
      border-radius: 14px;
      font-family: 'Syne', sans-serif; 
      font-weight: 700;
      font-size: 15px;
      cursor: pointer; 
      transition: 0.3s;
    }

    .btn-upload { 
      background: var(--accent-purple); 
      color: white;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .btn-upload:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    .btn-view { 
      background: rgba(255, 255, 255, 0.1); 
      color: white;
      border: 1px solid var(--border-color);
    }

    .btn-view:hover { 
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Toast */
    .toast {
      position: fixed; 
      bottom: 30px; 
      right: 30px;
      padding: 15px 25px; 
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0; 
      transform: translateY(20px);
      transition: 0.3s; 
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .toast.show { 
      opacity: 1; 
      transform: translateY(0);
    }

    .toast.success { 
      background: rgba(63, 185, 80, 0.2);
      color: #a7f3d0;
      border: 1px solid rgba(63, 185, 80, 0.4);
    }

    .toast.error {
      background: rgba(248, 81, 73, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(248, 81, 73, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        padding: 20px;
        flex-direction: row;
        overflow-x: auto;
        align-items: center;
      }

      .user-profile-section {
        flex-direction: row;
        gap: 15px;
        padding: 0;
        margin: 0;
        border: none;
        margin-left: 20px;
      }

      .user-avatar {
        width: 50px;
        height: 50px;
        margin-bottom: 0;
      }

      .user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .user-name {
        margin-bottom: 0;
      }

      .user-divider {
        display: none;
      }

      nav {
        flex-direction: row;
        gap: 10px;
        margin-left: auto;
      }

      .sidebar a {
        margin: 0;
        padding: 8px 12px;
        font-size: 12px;
      }

      .logout {
        margin-top: 0;
      }

      .main {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .upload-box {
        padding: 30px;
        max-width: 100%;
        border-radius: 20px;
      }

      .drop-area {
        padding: 30px;
        border-radius: 15px;
      }

      .upload-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    
    <!-- Sidebar -->
  <div class="sidebar">
      <h2>AppInsight</h2>
      <div class="user-profile-section">
        <a href="/profile.html"><img src="/static/Image - Copy/user.png" alt="Profile" class="user-avatar"></a>
        <span class="user-name" id="userName">User</span>
        <span class="user-email" id="userEmail">Email</span>
      </div>
      <nav>
        <a href="/dashboard">Sentiment Analysis</a>
        <a href="/compare">Compare Apps</a>
        <a href="/upload" class="active">Upload Center</a>
        <a href="/files">File Library</a>
      </nav>
      <div class="logout" style="margin-top:auto;"><a href="/logout" style="color:var(--text-muted); text-decoration:none;">Log Out</a></div>
    </div>

    <!-- Main -->
    <div class="main">
      <h1>File Upload</h1>

      <div class="upload-box">
        <h2>Process Reviews</h2>
        <p>Ensure your CSV includes: <strong>review</strong>, <strong>rating</strong>, and <strong>app_name</strong> columns for accurate analysis.</p>

        <input type="file" id="fileInput" accept=".csv" hidden/>
        
        <div class="drop-area" id="dropArea" onclick="openFile()">
          <p id="dropText">📁 Click or Drag & Drop CSV file here</p>
        </div>

        <div class="validation-panel" id="validationPanel">
          <div id="colRows"></div>
        </div>

        <div class="upload-actions">
          <button class="btn-upload" onclick="openFile()">Browse Files</button>
          <button class="btn-view" onclick="goDashboard()">Analyze Results</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
  
    function loadUserData() {
      fetch('/api/profile')
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (!res.success) return;
          var u = res.user;
          document.getElementById('userName').textContent  = ((u.first_name || '') + ' ' + (u.last_name || '')).trim() || 'User';
          document.getElementById('userEmail').textContent = u.email || '';
        });
    }
    
    
    loadUserData();
    
    var REQUIRED_COLS = ['review', 'rating', 'app_name'];
    var toastTimer;

    function openFile() {
      document.getElementById('fileInput').click();
    }

    function showToast(msg, type) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + (type || 'success') + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { 
        toast.classList.remove('show'); 
      }, 3000);
    }

    var selectedFile = null;

    function handleFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const firstLine = text.split(/\r?\n/)[0] || '';
        const headers = firstLine.toLowerCase().split(',').map(h => h.trim().replace(/^"|"$/g, ''));

        let html = '';
        let allOk = true;

        REQUIRED_COLS.forEach(col => {
          const found = headers.indexOf(col) !== -1;
          if (!found) allOk = false;
          html += '<div class="col-row">' +
                  '<span class="col-icon ' + (found ? 'ok' : 'err') + '">' +
                  (found ? '✓' : '✗') +
                  '</span>' +
                  '<span>Column <strong>' + col + '</strong> ' +
                  (found ? 'found' : 'missing') + '</span>' +
                  '</div>';
        });

        document.getElementById('colRows').innerHTML = html;
        document.getElementById('validationPanel').classList.add('show');
        document.getElementById('dropText').innerText = "✓ " + file.name;

        if (allOk) {
          showToast('File validated! Click "Analyze Results" to run the model.', 'success');
        } else {
          showToast('Some required columns are missing.', 'error');
        }
      };
      reader.readAsText(file);
    }

    function goDashboard() {
      if (!selectedFile) {
        window.location.href = '/dashboard';
        return;
      }
      var formData = new FormData();
      formData.append('file', selectedFile);
      showToast('Analyzing with model… please wait.', 'success');

      fetch('/api/upload', { method: 'POST', body: formData })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.error || !data.success) {
            showToast('Error: ' + (data.error || 'Upload failed.'), 'error');
          } else {
            window.location.href = '/dashboard?file_id=' + data.file_id;
          }
        })
        .catch(function() {
          showToast('Server error. Please try again.', 'error');
        });
    }

    // File Input Change Event
    document.getElementById('fileInput').addEventListener('change', function(e) {
      if (e.target.files[0]) {
        handleFile(e.target.files[0]);
      }
    });

    // Drag and Drop Logic
    var dropArea = document.getElementById('dropArea');
    
    dropArea.addEventListener('dragover', (e) => { 
      e.preventDefault(); 
      dropArea.classList.add('dragover'); 
    });

    dropArea.addEventListener('dragleave', () => { 
      dropArea.classList.remove('dragover'); 
    });

    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      dropArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });
  </script>

</body>
</html>
