<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppInsight – Admin | Manage FAQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(155deg, #1a0540 0%, #2d0e6e 100%);
      color: white;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 230px;
      background: #1a0540;
      padding: 30px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 50px;
    }

    .sidebar a {
      color: #c5b8e8;
      text-decoration: none;
      margin: 15px 0;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .sidebar a:hover  { color: white; }
    .sidebar a.active { color: white; font-weight: 600; }

    .sidebar .nav-label {
      font-size: 0.65rem;
      color: rgba(197, 184, 232, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 24px 0 8px;
    }

    .logout { margin-top: auto; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 40px;
      min-width: 0;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 30px;
    }

    .admin-badge {
      background: rgba(167, 139, 250, 0.18);
      border: 1px solid rgba(167, 139, 250, 0.35);
      color: #c4b5fd;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    /* ── Stat cards (white) ── */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      color: #1a0540;
      padding: 22px 25px;
      border-radius: 18px;
      flex: 1;
    }

    .stat-card .label {
      font-size: 12px;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .stat-card .val {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 11px 16px 11px 40px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: rgba(197, 184, 232, 0.5); }
    .search-wrap input:focus { border-color: rgba(167, 139, 250, 0.5); }

    .btn-add {
      padding: 11px 22px;
      background: white;
      color: #1a0540;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .btn-add:hover { opacity: 0.88; }

    /* ── FAQ table panel (glass) ── */
    .faq-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      overflow: hidden;
    }

    .faq-table {
      width: 100%;
      border-collapse: collapse;
    }

    .faq-table thead tr {
      background: rgba(255, 255, 255, 0.05);
    }

    .faq-table th {
      padding: 13px 22px;
      text-align: left;
      font-size: 0.7rem;
      color: #c4b5fd;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .faq-table td {
      padding: 15px 22px;
      font-size: 0.87rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: middle;
      color: rgba(255, 255, 255, 0.88);
    }

    .faq-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .q-text {
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .a-preview {
      font-size: 0.8rem;
      color: rgba(197, 184, 232, 0.65);
      line-height: 1.5;
    }

    .num-cell {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: rgba(196, 181, 253, 0.6);
      font-size: 0.82rem;
      width: 46px;
    }

    .action-btns {
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-edit {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid rgba(167, 139, 250, 0.3);
      background: rgba(167, 139, 250, 0.15);
      color: #c4b5fd;
      transition: background 0.2s;
    }

    .btn-edit:hover { background: rgba(167, 139, 250, 0.28); }

    .btn-delete {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid rgba(248, 113, 113, 0.25);
      background: rgba(248, 113, 113, 0.12);
      color: #fca5a5;
      transition: background 0.2s;
    }

    .btn-delete:hover { background: rgba(248, 113, 113, 0.25); }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: rgba(197, 184, 232, 0.5);
      font-size: 0.9rem;
    }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #1e0954;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 36px;
      width: 100%;
      max-width: 500px;
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .modal .form-group {
      margin-bottom: 18px;
    }

    .modal .form-group label {
      display: block;
      font-size: 0.78rem;
      color: #c5b8e8;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modal .form-group input,
    .modal .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 11px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .modal .form-group textarea { min-height: 90px; }

    .modal .form-group input:focus,
    .modal .form-group textarea:focus {
      border-color: rgba(167, 139, 250, 0.55);
    }

    .modal .form-group input::placeholder,
    .modal .form-group textarea::placeholder {
      color: rgba(197, 184, 232, 0.4);
    }

    .field-error-msg {
      font-size: 0.75rem;
      color: #fca5a5;
      margin-top: 5px;
      display: none;
    }

    .field-error-msg.visible { display: block; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 26px;
    }

    .btn-save {
      flex: 1;
      padding: 13px;
      background: #3a12a0;
      border: none;
      border-radius: 11px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #5b21b6; }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 11px;
      color: #c5b8e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: rgba(255, 255, 255, 0.12); }

    /* ── Delete modal ── */
    .modal.delete-modal { text-align: center; }

    .delete-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(248, 113, 113, 0.15);
      border: 2px solid rgba(248, 113, 113, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 16px;
    }

    .modal.delete-modal h3 { margin-bottom: 8px; }

    .modal.delete-modal p {
      font-size: 0.88rem;
      color: #c5b8e8;
      margin-bottom: 0;
    }

    .modal.delete-modal .del-q {
      font-size: 0.82rem;
      color: rgba(197, 184, 232, 0.6);
      margin-top: 8px;
      font-style: italic;
    }

    .btn-confirm-delete {
      flex: 1;
      padding: 13px;
      background: rgba(248, 113, 113, 0.2);
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 11px;
      color: #fca5a5;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-confirm-delete:hover { background: rgba(248, 113, 113, 0.35); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 13px 22px;
      border-radius: 12px;
      font-size: 0.86rem;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .toast.success {
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #6ee7b7;
    }

    .toast.error {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <h2>AppInsight</h2>
      <span class="nav-label">Admin</span>
      <a href="/admin">Dashboard</a>
      <a href="/admin/users">Manage Users</a>
      <a href="/admin/model">Sentiment Model</a>
      <a href="/admin/faq" class="active">Manage FAQ</a>
      <div class="logout">
        <div class="logout">
  <a href="/admin-logout">Log Out</a>
</div>
      </div>
    </div>

    <!-- ── Main ── -->
    <div class="main">

      <div class="topbar">
        <span class="admin-badge">Admin Panel</span>
      </div>

      <h1 style="font-family: 'Syne', sans-serif; margin-bottom: 30px;">
        Manage <span style="color: #c4b5fd;">FAQ</span>
      </h1>

      <!-- ── Stats ── -->
      <p class="section-title">Overview</p>
      <div class="cards">
        <div class="stat-card">
          <div class="label">Total FAQs</div>
          <div class="val" id="totalFaqs">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Published</div>
          <div class="val" id="publishedFaqs" style="color: #16a34a;">0</div>
        </div>
      </div>

      <!-- ── Toolbar ── -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by question or answer…"
            oninput="filterFaqs()"
          />
        </div>
        <button class="btn-add" onclick="openAddModal()">
          <span>＋</span> Add New FAQ
        </button>
      </div>

      <!-- ── FAQ Table ── -->
      <p class="section-title">FAQ Entries</p>
      <div class="faq-panel">
        <table class="faq-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Question &amp; Answer</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="faqTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- ── Add / Edit Modal ── -->
  <div class="modal-overlay" id="faqModal">
    <div class="modal">
      <h3 id="modalTitle">Add FAQ</h3>

      <div class="form-group">
        <label>Question</label>
        <textarea id="editQuestion" placeholder="Enter the FAQ question…"></textarea>
        <div class="field-error-msg" id="questionError">Question is required.</div>
      </div>

      <div class="form-group">
        <label>Answer</label>
        <textarea id="editAnswer" rows="4" placeholder="Enter the answer…"></textarea>
        <div class="field-error-msg" id="answerError">Answer is required.</div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('faqModal')">Cancel</button>
        <button class="btn-save" onclick="saveFaq()">Save FAQ</button>
      </div>
    </div>
  </div>

  <!-- ── Delete Modal ── -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal delete-modal">
      <div class="delete-icon">🗑️</div>
      <h3>Delete FAQ?</h3>
      <p>This action cannot be undone.</p>
      <p class="del-q" id="deletePreview"></p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">Yes, Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Default FAQ data (matches FAQ.html) ────────────────────────────────
    var DEFAULT_FAQS = [
      {
        id: 1,
        question: 'What is AppInsight?',
        answer: 'AppInsight is a web-based dashboard that analyzes user reviews from fashion shopping mobile applications. It helps you understand user sentiment at a glance.'
      },
      {
        id: 2,
        question: 'How does AppInsight work?',
        answer: "It's easy! You upload a file containing app reviews, and AppInsight analyzes the text to produce sentiment results such as positive, negative, or neutral, and a rating from 1 to 5."
      },
      {
        id: 3,
        question: 'Which app stores does AppInsight support?',
        answer: 'AppInsight supports reviews collected from Google Play Store and iOS (Apple App Store), covering the two most widely used mobile platforms.'
      },
      {
        id: 4,
        question: 'Who uses AppInsight?',
        answer: 'AppInsight can be useful to any user who wants to understand what users think about their apps — from indie developers to large product teams.'
      }
    ];

    // ── State ─────────────────────────────────────────────────────────────
    var faqs        = [];
    var filtered    = [];
    var editingId   = null;
    var deletingId  = null;

    function loadFaqs() {
      fetch('/api/faqs')
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          faqs     = rows.map(function(r) { return { id: r.faq_id, question: r.question, answer: r.answer }; });
          filtered = faqs.slice();
          renderStats();
          renderTable();
        });
    }

    // ── Stats ─────────────────────────────────────────────────────────────
    function renderStats() {
      document.getElementById('totalFaqs').textContent     = faqs.length;
      document.getElementById('publishedFaqs').textContent = faqs.length;
    }

    // ── Filter / Search ───────────────────────────────────────────────────
    function filterFaqs() {
      var q = document.getElementById('searchInput').value.trim().toLowerCase();
      filtered = faqs.filter(function(f) {
        return f.question.toLowerCase().includes(q) ||
               f.answer.toLowerCase().includes(q);
      });
      renderTable();
    }

    // ── Table ─────────────────────────────────────────────────────────────
    function renderTable() {
      var tbody = document.getElementById('faqTableBody');

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="3">No FAQ entries found.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(function(f, idx) {
        var preview = f.answer.length > 90
          ? f.answer.slice(0, 90) + '…'
          : f.answer;
        return '<tr>'
          + '<td class="num-cell">' + (idx + 1) + '</td>'
          + '<td>'
          +   '<div class="q-text">' + escHtml(f.question) + '</div>'
          +   '<div class="a-preview">' + escHtml(preview) + '</div>'
          + '</td>'
          + '<td>'
          +   '<div class="action-btns">'
          +     '<button class="btn-edit"   onclick="openEditModal(' + f.id + ')">Edit</button>'
          +     '<button class="btn-delete" onclick="openDeleteModal(' + f.id + ')">Delete</button>'
          +   '</div>'
          + '</td>'
          + '</tr>';
      }).join('');
    }

    // ── Modal helpers ─────────────────────────────────────────────────────
    function openModal(id) {
      document.getElementById(id).classList.add('open');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      clearErrors();
    }

    document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          overlay.classList.remove('open');
          clearErrors();
        }
      });
    });

    // ── Add modal ─────────────────────────────────────────────────────────
    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent      = 'Add FAQ';
      document.getElementById('editQuestion').value          = '';
      document.getElementById('editAnswer').value            = '';
      clearErrors();
      openModal('faqModal');
      document.getElementById('editQuestion').focus();
    }

    // ── Edit modal ────────────────────────────────────────────────────────
    function openEditModal(id) {
      var faq = faqs.find(function(f) { return f.id === id; });
      if (!faq) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit FAQ';
      document.getElementById('editQuestion').value     = faq.question;
      document.getElementById('editAnswer').value       = faq.answer;
      clearErrors();
      openModal('faqModal');
    }

    // ── Save (add or update) ──────────────────────────────────────────────
    function saveFaq() {
      var question = document.getElementById('editQuestion').value.trim();
      var answer   = document.getElementById('editAnswer').value.trim();
      var valid    = true;

      if (!question) {
        document.getElementById('questionError').classList.add('visible');
        valid = false;
      }
      if (!answer) {
        document.getElementById('answerError').classList.add('visible');
        valid = false;
      }
      if (!valid) return;

      var url    = editingId !== null ? '/api/admin/faqs/' + editingId : '/api/admin/faqs';
      var method = editingId !== null ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question, answer: answer })
      })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.success) {
            showToast(editingId !== null ? 'FAQ updated successfully.' : 'New FAQ added successfully.', 'success');
            loadFaqs();
            closeModal('faqModal');
          } else {
            showToast('Error: ' + (res.error || 'Failed.'), 'error');
          }
        });
    }

    // ── Delete modal ──────────────────────────────────────────────────────
    function openDeleteModal(id) {
      deletingId = id;
      var faq = faqs.find(function(f) { return f.id === id; });
      var preview = faq
        ? '"' + (faq.question.length > 55 ? faq.question.slice(0, 55) + '…' : faq.question) + '"'
        : '';
      document.getElementById('deletePreview').textContent = preview;
      openModal('deleteModal');
    }

    function confirmDelete() {
      if (deletingId === null) return;
      fetch('/api/admin/faqs/' + deletingId, { method: 'DELETE' })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res.success) {
            deletingId = null;
            loadFaqs();
            closeModal('deleteModal');
            showToast('FAQ deleted.', 'success');
          } else {
            showToast('Error: ' + (res.error || 'Failed.'), 'error');
          }
        });
    }

    // ── Validation helpers ────────────────────────────────────────────────
    function clearErrors() {
      document.getElementById('questionError').classList.remove('visible');
      document.getElementById('answerError').classList.remove('visible');
    }

    // ── HTML escape ───────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    var toastTimer;
    function showToast(msg, type) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className   = 'toast ' + (type || 'success') + ' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() {
        toast.classList.remove('show');
      }, 3200);
    }

    // ── Init ──────────────────────────────────────────────────────────────
    loadFaqs();
  </script>

</body>
</html>
